name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Wagner3UB  # <--- COLOQUE SEU USERNAME
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Rome # Configurado para seu fuso na Itália
          plugin_lines: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: B      # Mostra conquistas de nível B para cima
          plugin_achievements_display: compact  # Estilo mais limpo
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons # ou labels
