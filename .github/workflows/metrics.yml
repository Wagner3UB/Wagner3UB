name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] 
  workflow_dispatch: 
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Wagner3UB
          template: classic
          base: header, community
          repositories_affiliations: owner, collaborator, organization_member
          
          # Foco em Linguagens (incluindo Plone e Orgs)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes 
          
          # Contribuições Notáveis (Plone, Italia, RedTurtle)
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_filter: Plone, italia, RedTurtle
          
          # Calendário 3D
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Tópicos (Ajustado para funcionar corretamente)
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          
          # Conquistas (Removido o filtro restritivo para evitar erro de busca)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B

          config_timezone: Europe/Rome
