<svg xmlns="http://www.w3.org/2000/svg" width="190" height="28" role="img" aria-label="Volto: a11y Team">
  <title>Volto · a11y Team</title>
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff595e"/>
      <stop offset="25%"  stop-color="#ffca3a"/>
      <stop offset="55%"  stop-color="#6a994e"/>
      <stop offset="80%"  stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#9b5de5"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="190" height="28" rx="4"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Left: dark background -->
    <rect width="90" height="28" fill="#555555"/>
    <!-- Right: rainbow gradient -->
    <rect x="90" width="100" height="28" fill="url(#rainbow)"/>
    <!-- Darken right slightly for legibility -->
    <rect x="90" width="100" height="28" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- React icon (simplified atom) centered at x=14, y=14 -->
  <g transform="translate(12,14)" fill="none" stroke="white" stroke-width="1.2">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2" fill="white" stroke="none"/>
    <!-- Three orbits -->
    <ellipse rx="9" ry="3.5" transform="rotate(0)"/>
    <ellipse rx="9" ry="3.5" transform="rotate(60)"/>
    <ellipse rx="9" ry="3.5" transform="rotate(120)"/>
  </g>

  <!-- Divider line -->
  <rect x="89" y="0" width="1" height="28" fill="rgba(0,0,0,0.3)"/>

  <!-- Left label: VOLTO -->
  <text x="52" y="18.5" text-anchor="middle" fill="white"
        font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
        font-size="10" letter-spacing="0.8">VOLTO</text>

  <!-- Right label: A11Y TEAM -->
  <text x="140" y="18.5" text-anchor="middle" fill="white"
        font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
        font-size="11" font-weight="bold" letter-spacing="0.5">A11Y TEAM</text>
</svg>
