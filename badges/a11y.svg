<svg xmlns="http://www.w3.org/2000/svg" width="160" height="28" role="img" aria-label="Volto: a11y Team">
  <title>Volto · a11y Team</title>
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff595e"/>
      <stop offset="20%"  stop-color="#ff924c"/>
      <stop offset="40%"  stop-color="#ffca3a"/>
      <stop offset="60%"  stop-color="#6a994e"/>
      <stop offset="80%"  stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#9b5de5"/>
    </linearGradient>
    <clipPath id="r">
      <rect width="160" height="28" rx="5"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="160" height="28" fill="url(#rainbow)"/>
    <rect width="160" height="28" fill="rgba(0,0,0,0.18)"/>
  </g>
  <text x="80" y="18.5" text-anchor="middle" fill="white"
        font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
        font-size="11" font-weight="bold" letter-spacing="0.5">
    Volto · a11y Team
  </text>
</svg>
